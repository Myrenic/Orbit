{{- if and .Values.oidc.clientId .Values.oidc.clientSecret }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ include "generic-service.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "generic-service.labels" . | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ include "generic-service.name" . }}
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ include "generic-service.name" . }}-public
  oidc:
    provider:
      issuer: https://id.wagner.gg
    clientID: {{ .Values.oidc.clientId }}
    clientSecret:
      name: {{ include "generic-service.name" . }}-securitypolicy
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "generic-service.name" . }}-securitypolicy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "generic-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  client-secret: {{ .Values.oidc.clientSecret }}
{{- end }}
