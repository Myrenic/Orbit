---
name: Kustomize GitHub Actions
on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - "*"
    paths:
      - "kubernetes/**"
      - "helm-charts/**"
      - ".github/scripts/validate_kustomize_scopes.py"
      - ".github/workflows/verify-kustomize.yaml"

jobs:
  kustomize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install Kustomize
        run: |
          curl -s https://api.github.com/repos/kubernetes-sigs/kustomize/releases/latest \
          | grep browser_download_url \
          | grep linux_amd64.tar.gz \
          | cut -d '"' -f 4 \
          | xargs curl -L -o kustomize.tar.gz && \
          tar -xzf kustomize.tar.gz && \
          sudo mv kustomize /usr/local/bin/
      - name: Build changed kustomize scopes
        run: |
          python3 .github/scripts/validate_kustomize_scopes.py --base-ref "${{ github.base_ref }}"
