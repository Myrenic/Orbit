---
name: Build Orbit Backup UI
on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - "*"
    paths:
      - apps/orbit-backup-ui/**
      - kubernetes/services/orbit-backup-ui/**
      - .github/workflows/build-orbit-backup-ui.yaml
  push:
    branches:
      - main
    paths:
      - apps/orbit-backup-ui/**
      - kubernetes/services/orbit-backup-ui/**
      - .github/workflows/build-orbit-backup-ui.yaml

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/orbit-backup-ui
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: apps/orbit-backup-ui
          file: apps/orbit-backup-ui/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
