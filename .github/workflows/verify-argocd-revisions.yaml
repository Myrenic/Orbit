---
name: Validate argocd revisions
on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - "*"
    paths:
      - "kubernetes/argocd/argocd-apps/**"
      - ".github/scripts/validate_argocd_revisions.py"
      - ".github/workflows/verify-argocd-revisions.yaml"

jobs:
  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check manifest references
        run: |
          python3 .github/scripts/validate_argocd_revisions.py
