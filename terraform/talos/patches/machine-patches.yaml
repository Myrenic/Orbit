---
# extentions:
# siderolabs/i915
# siderolabs/intel-ice-firmware
# siderolabs/intel-ucode
# siderolabs/iscsi-tools
# siderolabs/nfsd
# siderolabs/nfsrahead
# siderolabs/nvme-cli
# siderolabs/realtek-firmware
# siderolabs/util-linux-tools

machine:
  network:
    interfaces:
      - interface: enp2s0
        dhcp: false
        vlans:
          - vlanId: 69
            addresses:
              - "10.0.69.101/24"
            routes:
              - network: 0.0.0.0/0
                gateway: 10.0.69.1
  kubelet:
    extraMounts:
      - destination: /var/lib/longhorn-sda
        type: bind
        source: /var/lib/longhorn-sda
        options:
          - bind
          - rshared
          - rw
---
apiVersion: v1alpha1
kind: UserVolumeConfig
name: longhorn-sda
provisioning:
  diskSelector:
    match: disk.transport == 'sata'
  minSize: 100GB
