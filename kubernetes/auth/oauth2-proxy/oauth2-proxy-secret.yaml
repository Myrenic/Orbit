apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-secret
  namespace: auth
type: Opaque
stringData:
  client-id: ${AZURE_CLIENT_ID}
  client-secret: ${AZURE_CLIENT_SECRET}
  cookie-secret: ${OAUTH2_PROXY_COOKIE_SECRET}
  oidc-issuer-url: https://login.microsoftonline.com/${AZURE_TENANT_ID}/v2.0
