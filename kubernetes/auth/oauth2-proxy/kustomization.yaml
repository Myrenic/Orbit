---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: auth

resources:
  - oauth2-proxy-secret.yaml
  - templates-configmap.yaml
  - route.yaml

helmCharts:
  - name: oauth2-proxy
    repo: https://oauth2-proxy.github.io/manifests
    version: 10.4.3
    releaseName: oauth2-proxy
    namespace: auth
    valuesFile: values.yaml
