---
image:
  repository: "couchdb"
  tag: "latest@sha256:a2c8839c86304962ae60df41c9aa51907925b7ca022b69acfcd45663a89daa77"

ports:
  - name: main
    containerPort: 5984

imagePullPolicy: Always

secretEnvs:
  - COUCHDB_USER: 
  - COUCHDB_PASSWORD: 

ingress:
  host: obsidian.tuntelder.com
  port: main

hostPaths:
  - name: aiostreams-config
    type: longhorn
    accessMode: ReadWriteMany
    size: 20Gi
    containerPath: /opt/couchdb/data

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
