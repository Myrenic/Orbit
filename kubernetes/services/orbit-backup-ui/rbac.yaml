---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: orbit-backup-ui
rules:
  - apiGroups: [""]
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
      - create
  - apiGroups: [""]
    resources:
      - pods
      - services
    verbs:
      - get
      - list
      - watch
      - delete
  - apiGroups: [""]
    resources:
      - persistentvolumeclaims
      - persistentvolumes
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups: ["batch"]
    resources:
      - cronjobs
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  - apiGroups: ["longhorn.io"]
    resources:
      - volumes
      - snapshots
      - backups
      - backuptargets
      - recurringjobs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - delete
  - apiGroups: ["argoproj.io"]
    resources:
      - applications
    verbs:
      - get
      - list
      - watch
      - update
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: orbit-backup-ui
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: orbit-backup-ui
subjects:
  - kind: ServiceAccount
    name: orbit-backup-ui
    namespace: services
