---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: orbit-backup-ui
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - pods
      - persistentvolumeclaims
      - persistentvolumes
    verbs:
      - get
      - list
      - watch
      - create
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs:
      - get
      - list
      - watch
      - create
  - apiGroups: ["longhorn.io"]
    resources:
      - volumes
      - snapshots
      - backups
      - backuptargets
      - recurringjobs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: orbit-backup-ui
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: orbit-backup-ui
subjects:
  - kind: ServiceAccount
    name: orbit-backup-ui
    namespace: services
