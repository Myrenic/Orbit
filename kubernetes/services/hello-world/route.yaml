---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hello-world-ingressroute
  namespace: services
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`hello.${SECRET_DOMAIN_0}`)
      kind: Rule
      middlewares:
        - name: oauth2-proxy-auth
          namespace: network
      services:
        - name: hello-world-service
          port: 80
  tls:
    certResolver: letsencrypt
