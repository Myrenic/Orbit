---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: local-only
  namespace: network
spec:
  ipAllowList:
    sourceRange:
      - "10.0.0.0/8"
      - "127.0.0.1/32"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-proxy-forwardauth
  namespace: network
spec:
  forwardAuth:
    address: "http://oauth2-proxy.auth.svc.cluster.local:80/oauth2/auth"
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Groups
      - X-Auth-Request-Preferred-Username
      - X-Auth-Request-Access-Token
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-proxy-errors
  namespace: network
spec:
  errors:
    status:
      - "401"
    service:
      name: oauth2-proxy
      namespace: auth
      port: 80
    query: "/oauth2/sign_in"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-proxy-auth
  namespace: network
spec:
  chain:
    middlewares:
      - name: oauth2-proxy-errors
      - name: oauth2-proxy-forwardauth
