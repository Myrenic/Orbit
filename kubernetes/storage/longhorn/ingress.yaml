---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: longhorn-ingress-traefik
  namespace: storage
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`longhorn.tuntelder.com`)
      kind: Rule
      # middlewares:
      #   - name: local-only
      #     namespace: network
      services:
        - name: longhorn-frontend
          port: 80
  tls:
    certResolver: letsencrypt
