---
config:
  clients:
    - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push

  snippets:
    pipelineStages:
      - cri: {}
      - match:
          selector: '{app="traefik", namespace="network", container="traefik"}'
          stages:
            - json:
                expressions:
                  banned_ip: banned_ip
            - geoip:
                db: /geoip/GeoLite2-City.mmdb
                source: banned_ip
                db_type: city
            # Drop all geoip labels except country_iso_code and country_name.
            # The geoip stage promotes ~11 labels; Loki's default limit is 15
            # and the Traefik stream already has 8 base labels.
            - labeldrop:
                - geoip_city_name
                - geoip_continent_name
                - geoip_continent_code
                - geoip_postal_code
                - geoip_timezone
                - geoip_location_latitude
                - geoip_location_longitude
                - geoip_subdivision_name
                - geoip_subdivision_code
                - geoip_asn_number
                - geoip_asn_organization

tolerations:
  - effect: NoSchedule
    operator: Exists
  - effect: NoExecute
    operator: Exists

initContainer:
  - name: download-geoip-db
    image: busybox:latest
    command:
      - sh
      - -c
      - |
        wget -q -O /tmp/geoip.tar.gz \
          "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-City&license_key=${MAXMIND_LICENSE_KEY}&suffix=tar.gz" && \
        tar -xzf /tmp/geoip.tar.gz -C /tmp && \
        find /tmp -name "GeoLite2-City.mmdb" -exec cp {} /geoip/GeoLite2-City.mmdb \;
    env:
      - name: MAXMIND_LICENSE_KEY
        valueFrom:
          secretKeyRef:
            name: geoip-secret
            key: license-key
    volumeMounts:
      - name: geoip-db
        mountPath: /geoip

extraVolumes:
  - name: geoip-db
    emptyDir: {}

extraVolumeMounts:
  - name: geoip-db
    mountPath: /geoip
