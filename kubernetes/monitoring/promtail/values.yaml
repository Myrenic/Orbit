---
config:
  clients:
    - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push

  snippets:
    pipelineStages:
      - cri: {}
      - match:
          selector: '{app="traefik", namespace="network", container="traefik"}'
          stages:
            - json:
                expressions:
                  banned_ip: banned_ip
            - geoip:
                db: /geoip/GeoLite2-City.mmdb
                source: banned_ip
                db_type: city
            - labels:
                country_iso_code:
                country_name:

tolerations:
  - effect: NoSchedule
    operator: Exists
  - effect: NoExecute
    operator: Exists

initContainer:
  - name: download-geoip-db
    image: busybox:latest
    command:
      - sh
      - -c
      - |
        wget -q -O /tmp/geoip.tar.gz \
          "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-City&license_key=${MAXMIND_LICENSE_KEY}&suffix=tar.gz" && \
        tar -xzf /tmp/geoip.tar.gz -C /tmp && \
        find /tmp -name "GeoLite2-City.mmdb" -exec cp {} /geoip/GeoLite2-City.mmdb \;
    env:
      - name: MAXMIND_LICENSE_KEY
        valueFrom:
          secretKeyRef:
            name: geoip-secret
            key: license-key
    volumeMounts:
      - name: geoip-db
        mountPath: /geoip

extraVolumes:
  - name: geoip-db
    emptyDir: {}

extraVolumeMounts:
  - name: geoip-db
    mountPath: /geoip
