---
# Loki in SingleBinary mode — simple single-replica setup suitable for a homelab cluster
deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  storage:
    type: filesystem

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  limits_config:
    allow_structured_metadata: false

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: longhorn
    size: 20Gi

# Disable distributed components — not needed for SingleBinary
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Disable caches — not needed at this scale
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# No object storage needed
minio:
  enabled: false

# Disable the gateway — use direct port 3100 instead
gateway:
  enabled: false

monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false
  serviceMonitor:
    enabled: true
  dashboards:
    # Adds default Loki operational dashboards to Grafana via ConfigMap
    enabled: true
    labels:
      grafana_dashboard: "1"
