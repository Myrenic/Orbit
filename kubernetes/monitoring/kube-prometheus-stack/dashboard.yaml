---
apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-security-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  traefik-security.json: |
    {
      "title": "Traefik Security \u2014 Fail2ban Monitor",
      "uid": "traefik-fail2ban",
      "description": "Monitors 4xx/429 requests tracked by the Traefik fail2ban middleware. Adjust Ban Threshold and Ban Window variables to match your middleware config.",
      "tags": ["traefik", "security", "fail2ban"],
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-24h", "to": "now" },
      "timezone": "browser",
      "editable": true,
      "graphTooltip": 1,
      "templating": {
        "list": [
          {
            "name": "ban_threshold",
            "label": "Ban Threshold (fails)",
            "type": "custom",
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "query": "3,5,10,20",
            "current": { "selected": true, "text": "5", "value": "5" },
            "options": [
              { "selected": false, "text": "3",  "value": "3"  },
              { "selected": true,  "text": "5",  "value": "5"  },
              { "selected": false, "text": "10", "value": "10" },
              { "selected": false, "text": "20", "value": "20" }
            ]
          },
          {
            "name": "ban_window",
            "label": "Ban Window",
            "type": "custom",
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "query": "15m,30m,1h,6h",
            "current": { "selected": true, "text": "1h", "value": "1h" },
            "options": [
              { "selected": false, "text": "15m", "value": "15m" },
              { "selected": false, "text": "30m", "value": "30m" },
              { "selected": true,  "text": "1h",  "value": "1h"  },
              { "selected": false, "text": "6h",  "value": "6h"  }
            ]
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Blocked Requests (time range)",
          "description": "Total 4xx/429 requests in the selected time range",
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 0 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green",  "value": null },
                { "color": "yellow", "value": 100  },
                { "color": "red",    "value": 1000 }
              ]}
            },
            "overrides": []
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "sum(count_over_time({app=\"traefik\", namespace=\"network\", container=\"traefik\"} [$__range]))",
              "queryType": "instant",
              "instant": true,
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Unique Attacking IPs (time range)",
          "description": "Count of distinct source IPs sending 4xx-generating requests",
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 0 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green",  "value": null },
                { "color": "yellow", "value": 10   },
                { "color": "red",    "value": 50   }
              ]}
            },
            "overrides": []
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "count(sum by (ClientHost) (count_over_time({app=\"traefik\", namespace=\"network\", container=\"traefik\"} | json | ClientHost != \"\" | __error__=\"\" [$__range])))",
              "queryType": "instant",
              "instant": true,
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "IPs Above Ban Threshold (last $ban_window)",
          "description": "IPs that would currently be banned — sent \u2265 $ban_threshold requests in the last $ban_window",
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 0 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto",
            "noValue": "0"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "red",   "value": 1    }
              ]}
            },
            "overrides": []
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "count(sum by (ClientHost) (count_over_time({app=\"traefik\", namespace=\"network\", container=\"traefik\"} | json | ClientHost != \"\" | __error__=\"\" [$ban_window])) >= $ban_threshold)",
              "queryType": "instant",
              "instant": true,
              "legendFormat": ""
            }
          ]
        },
        {
          "id": 5,
          "type": "table",
          "title": "Top Attacking IPs (time range)",
          "description": "Top 20 source IPs by request count over the selected time range",
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 12 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "showHeader": true,
            "sortBy": [{ "desc": true, "displayName": "Request Count" }],
            "footer": { "show": false }
          },
          "fieldConfig": {
            "defaults": { "custom": { "align": "auto", "displayMode": "auto" } },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Value" },
                "properties": [
                  { "id": "displayName", "value": "Request Count" },
                  { "id": "custom.displayMode", "value": "color-background" },
                  { "id": "thresholds", "value": { "mode": "absolute", "steps": [
                    { "color": "green",  "value": null },
                    { "color": "yellow", "value": 5   },
                    { "color": "red",    "value": 20  }
                  ]}}
                ]
              }
            ]
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "topk(20, sum by (ClientHost) (count_over_time({app=\"traefik\", namespace=\"network\", container=\"traefik\"} | json | ClientHost != \"\" | __error__=\"\" [$__range])))",
              "queryType": "instant",
              "instant": true,
              "legendFormat": "{{ClientHost}}"
            }
          ],
          "transformations": [
            { "id": "labelsToFields", "options": { "mode": "columns" } },
            { "id": "organize", "options": {
              "excludeByName": { "Time": true },
              "renameByName": { "ClientHost": "IP Address", "Value": "Request Count" }
            }}
          ]
        },
        {
          "id": 6,
          "type": "table",
          "title": "IPs Above Ban Threshold (last $ban_window, \u2265 $ban_threshold fails)",
          "description": "These IPs would currently be blocked by the fail2ban middleware",
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 12 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "showHeader": true,
            "sortBy": [{ "desc": true, "displayName": "Request Count" }],
            "footer": { "show": false }
          },
          "fieldConfig": {
            "defaults": { "custom": { "align": "auto", "displayMode": "auto" } },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Value" },
                "properties": [
                  { "id": "displayName", "value": "Request Count" },
                  { "id": "custom.displayMode", "value": "color-background" },
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              }
            ]
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "sum by (ClientHost) (count_over_time({app=\"traefik\", namespace=\"network\", container=\"traefik\"} | json | ClientHost != \"\" | __error__=\"\" [$ban_window])) >= $ban_threshold",
              "queryType": "instant",
              "instant": true,
              "legendFormat": "{{ClientHost}}"
            }
          ],
          "transformations": [
            { "id": "labelsToFields", "options": { "mode": "columns" } },
            { "id": "organize", "options": {
              "excludeByName": { "Time": true },
              "renameByName": { "ClientHost": "IP Address", "Value": "Request Count" }
            }}
          ]
        },
        {
          "id": 7,
          "type": "logs",
          "title": "Recent Attack Log Entries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 22 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": true,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": false
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{app=\"traefik\", namespace=\"network\", container=\"traefik\"} | json | ClientHost != \"\" | __error__=\"\"",
              "legendFormat": ""
            }
          ]
        }
      ]
    }
