---
apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-security-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  traefik-security.json: |
    {
      "title": "Traefik Security \u2014 Fail2ban Monitor",
      "uid": "traefik-fail2ban",
      "description": "Confirmed ban events from the Traefik fail2ban plugin, with geographic origin map. Threshold variables match your middleware config.",
      "tags": ["traefik", "security", "fail2ban"],
      "schemaVersion": 39,
      "version": 2,
      "refresh": "30s",
      "time": { "from": "now-24h", "to": "now" },
      "timezone": "browser",
      "editable": true,
      "graphTooltip": 1,
      "templating": {
        "list": [
          {
            "name": "ban_threshold",
            "label": "Ban Threshold (fails)",
            "type": "custom",
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "query": "3,5,10,20",
            "current": { "selected": true, "text": "5", "value": "5" },
            "options": [
              { "selected": false, "text": "3",  "value": "3"  },
              { "selected": true,  "text": "5",  "value": "5"  },
              { "selected": false, "text": "10", "value": "10" },
              { "selected": false, "text": "20", "value": "20" }
            ]
          },
          {
            "name": "ban_window",
            "label": "Ban Window",
            "type": "custom",
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "query": "15m,30m,1h,6h",
            "current": { "selected": true, "text": "1h", "value": "1h" },
            "options": [
              { "selected": false, "text": "15m", "value": "15m" },
              { "selected": false, "text": "30m", "value": "30m" },
              { "selected": true,  "text": "1h",  "value": "1h"  },
              { "selected": false, "text": "6h",  "value": "6h"  }
            ]
          }
        ]
      },
      "panels": [

        {
          "id": 1,
          "type": "stat",
          "title": "Blocked Requests (time range)",
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 0 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "colorMode": "background", "graphMode": "area", "justifyMode": "auto",
            "orientation": "auto", "textMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "fieldConfig": {
            "defaults": { "unit": "short", "thresholds": { "mode": "absolute", "steps": [
              { "color": "green", "value": null }, { "color": "yellow", "value": 100 }, { "color": "red", "value": 1000 }
            ]}},
            "overrides": []
          },
          "targets": [{
            "refId": "A",
            "datasource": { "type": "loki", "uid": "loki" },
            "expr": "sum(count_over_time({app=\"traefik\", namespace=\"network\", container=\"traefik\"} [$__range]))",
            "queryType": "instant", "instant": true, "legendFormat": ""
          }]
        },

        {
          "id": 2,
          "type": "stat",
          "title": "Unique Attacking IPs (time range)",
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 0 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "colorMode": "background", "graphMode": "area", "justifyMode": "auto",
            "orientation": "auto", "textMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "fieldConfig": {
            "defaults": { "unit": "short", "thresholds": { "mode": "absolute", "steps": [
              { "color": "green", "value": null }, { "color": "yellow", "value": 10 }, { "color": "red", "value": 50 }
            ]}},
            "overrides": []
          },
          "targets": [{
            "refId": "A",
            "datasource": { "type": "loki", "uid": "loki" },
            "expr": "count(sum by (ClientHost) (count_over_time({app=\"traefik\", namespace=\"network\", container=\"traefik\"} | json | ClientHost != \"\" | __error__=\"\" [$__range])))",
            "queryType": "instant", "instant": true, "legendFormat": ""
          }]
        },

        {
          "id": 3,
          "type": "stat",
          "title": "Confirmed Bans (time range)",
          "description": "IPs the plugin actually banned \u2014 sourced from event=ban log entries, not threshold estimates",
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 0 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "colorMode": "background", "graphMode": "none", "justifyMode": "auto",
            "orientation": "auto", "textMode": "auto", "noValue": "0",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          },
          "fieldConfig": {
            "defaults": { "unit": "short", "thresholds": { "mode": "absolute", "steps": [
              { "color": "green", "value": null }, { "color": "red", "value": 1 }
            ]}},
            "overrides": []
          },
          "targets": [{
            "refId": "A",
            "datasource": { "type": "loki", "uid": "loki" },
            "expr": "count(sum by (banned_ip) (count_over_time({app=\"traefik\", namespace=\"network\", container=\"traefik\"} | json | event=\"ban\" | banned_ip != \"\" [$__range])))",
            "queryType": "instant", "instant": true, "legendFormat": ""
          }]
        },

        {
          "id": 4,
          "type": "timeseries",
          "title": "4xx Request Rate by Status Code",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 4 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "legend": { "calcs": ["sum"], "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "fieldConfig": {
            "defaults": { "custom": { "lineWidth": 2, "fillOpacity": 10 }, "color": { "mode": "palette-classic" } },
            "overrides": []
          },
          "targets": [{
            "refId": "A",
            "datasource": { "type": "loki", "uid": "loki" },
            "expr": "sum by (DownstreamStatus) (rate({app=\"traefik\", namespace=\"network\", container=\"traefik\"} | json | DownstreamStatus != \"\" | __error__=\"\" [$__interval]))",
            "legendFormat": "HTTP {{DownstreamStatus}}"
          }]
        },

        {
          "id": 5,
          "type": "table",
          "title": "Top Attacking IPs (time range)",
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 12 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "showHeader": true,
            "sortBy": [{ "desc": true, "displayName": "Request Count" }],
            "footer": { "show": false }
          },
          "fieldConfig": {
            "defaults": { "custom": { "align": "auto", "displayMode": "auto" } },
            "overrides": [{ "matcher": { "id": "byName", "options": "Value" }, "properties": [
              { "id": "displayName", "value": "Request Count" },
              { "id": "custom.displayMode", "value": "color-background" },
              { "id": "thresholds", "value": { "mode": "absolute", "steps": [
                { "color": "green", "value": null }, { "color": "yellow", "value": 5 }, { "color": "red", "value": 20 }
              ]}}
            ]}]
          },
          "targets": [{
            "refId": "A",
            "datasource": { "type": "loki", "uid": "loki" },
            "expr": "topk(20, sum by (ClientHost) (count_over_time({app=\"traefik\", namespace=\"network\", container=\"traefik\"} | json | ClientHost != \"\" | __error__=\"\" [$__range])))",
            "queryType": "instant", "instant": true, "legendFormat": "{{ClientHost}}"
          }],
          "transformations": [
            { "id": "labelsToFields", "options": { "mode": "columns" } },
            { "id": "organize", "options": { "excludeByName": { "Time": true }, "renameByName": { "ClientHost": "IP Address", "Value": "Request Count" } }}
          ]
        },

        {
          "id": 6,
          "type": "table",
          "title": "Confirmed Banned IPs (time range)",
          "description": "Only IPs the plugin emitted a ban event for \u2014 not threshold estimates",
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 12 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "showHeader": true,
            "sortBy": [{ "desc": true, "displayName": "Times Banned" }],
            "footer": { "show": false }
          },
          "fieldConfig": {
            "defaults": { "custom": { "align": "auto", "displayMode": "auto" } },
            "overrides": [{ "matcher": { "id": "byName", "options": "Value" }, "properties": [
              { "id": "displayName", "value": "Times Banned" },
              { "id": "custom.displayMode", "value": "color-background" },
              { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
            ]}]
          },
          "targets": [{
            "refId": "A",
            "datasource": { "type": "loki", "uid": "loki" },
            "expr": "sum by (banned_ip) (count_over_time({app=\"traefik\", namespace=\"network\", container=\"traefik\"} | json | event=\"ban\" | banned_ip != \"\" [$__range]))",
            "queryType": "instant", "instant": true, "legendFormat": "{{banned_ip}}"
          }],
          "transformations": [
            { "id": "labelsToFields", "options": { "mode": "columns" } },
            { "id": "organize", "options": { "excludeByName": { "Time": true }, "renameByName": { "banned_ip": "IP Address", "Value": "Times Banned" } }}
          ]
        },

        {
          "id": 7,
          "type": "geomap",
          "title": "Banned IP Origins",
          "description": "Geographic distribution of confirmed banned IPs. Requires MaxMind GeoLite2 \u2014 see promtail/geoip-secret.yaml.",
          "gridPos": { "h": 14, "w": 24, "x": 0, "y": 22 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "basemap": { "config": {}, "name": "Basemap", "type": "default" },
            "controls": { "mouseWheelZoom": true, "showAttribution": true, "showZoom": true },
            "layers": [{
              "config": {
                "showLegend": true,
                "style": {
                  "color": { "field": "Times Banned", "fixed": "red" },
                  "opacity": 0.8,
                  "size": { "field": "Times Banned", "fixed": 8, "max": 30, "min": 4 },
                  "symbol": { "fixed": "img/icons/marker/circle.svg", "mode": "fixed" }
                }
              },
              "location": {
                "gazetteer": "public/gazetteer/countries.json",
                "lookup": "geoip_country_iso_code",
                "mode": "lookup"
              },
              "name": "Banned IPs",
              "tooltip": true,
              "type": "markers"
            }],
            "tooltip": { "mode": "details" },
            "view": { "allLayers": true, "id": "zero", "lat": 30, "lon": 0, "zoom": 1.5 }
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "yellow", "value": null }, { "color": "orange", "value": 3 }, { "color": "red", "value": 10 }
              ]}
            },
            "overrides": []
          },
          "targets": [{
            "refId": "A",
            "datasource": { "type": "loki", "uid": "loki" },
            "expr": "sum by (geoip_country_iso_code, geoip_country_name, banned_ip) (count_over_time({app=\"traefik\", namespace=\"network\", container=\"traefik\"} | json | event=~\"ban|ban_extend\" | banned_ip != \"\" [$__range]))",
            "queryType": "instant", "instant": true,
            "legendFormat": "{{banned_ip}} ({{geoip_country_name}})"
          }],
          "transformations": [
            { "id": "labelsToFields", "options": { "mode": "columns" } },
            { "id": "organize", "options": {
              "excludeByName": { "Time": true },
              "renameByName": { "geoip_country_iso_code": "geoip_country_iso_code", "geoip_country_name": "Country", "banned_ip": "IP", "Value": "Times Banned" }
            }}
          ]
        },

        {
          "id": 8,
          "type": "logs",
          "title": "Ban / Unban Events",
          "description": "Confirmed plugin-emitted ban and unban events only",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 36 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "dedupStrategy": "none", "enableLogDetails": true, "prettifyLogMessage": true,
            "showCommonLabels": false, "showLabels": false, "showTime": true,
            "sortOrder": "Descending", "wrapLogMessage": false
          },
          "targets": [{
            "refId": "A",
            "datasource": { "type": "loki", "uid": "loki" },
            "expr": "{app=\"traefik\", namespace=\"network\", container=\"traefik\"} | json | event=~\"ban|unban\" | banned_ip != \"\"",
            "legendFormat": ""
          }]
        },

        {
          "id": 9,
          "type": "logs",
          "title": "Recent Attack Log (all 4xx)",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 44 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "dedupStrategy": "none", "enableLogDetails": true, "prettifyLogMessage": true,
            "showCommonLabels": false, "showLabels": false, "showTime": true,
            "sortOrder": "Descending", "wrapLogMessage": false
          },
          "targets": [{
            "refId": "A",
            "datasource": { "type": "loki", "uid": "loki" },
            "expr": "{app=\"traefik\", namespace=\"network\", container=\"traefik\"} | json | ClientHost != \"\" | __error__=\"\"",
            "legendFormat": ""
          }]
        }

      ]
    }
