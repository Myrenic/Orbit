---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-kustomize-helm-workaround
  labels:
    app.kubernetes.io/part-of: argocd
data:
  command.sh: |
    #!/bin/bash
    set -euo pipefail

    command="${1:-}"
    if [ -z "${command}" ]; then
      exec helm
    fi

    shift

    if [ "${command}" = "template" ] && [ -n "${PARAM_NAMESPACE:-}" ]; then
      exec helm "${command}" --namespace "${PARAM_NAMESPACE}" "$@"
    fi

    exec helm "${command}" "$@"
