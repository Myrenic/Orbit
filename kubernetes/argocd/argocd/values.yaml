---
configs:
  params:
    controller.diff.server.side: "true"
    # "Temporary" until BackendTLSPolicy is implemented https://github.com/cilium/cilium/issues/31352
    server.insecure: "true"
  cm:
    # This is default MINUS Endpoints
    resource.exclusions: |
      ### Network resources created by the Kubernetes control plane and excluded to reduce the number of watched events and UI clutter
      - apiGroups:
        - ''
        - discovery.k8s.io
        kinds:
        - EndpointSlice
      ### Internal Kubernetes resources excluded reduce the number of watched events
      - apiGroups:
        - coordination.k8s.io
        kinds:
        - Lease
      ### Internal Kubernetes Authz/Authn resources excluded reduce the number of watched events
      - apiGroups:
        - authentication.k8s.io
        - authorization.k8s.io
        kinds:
        - SelfSubjectReview
        - TokenReview
        - LocalSubjectAccessReview
        - SelfSubjectAccessReview
        - SelfSubjectRulesReview
        - SubjectAccessReview
      ### Intermediate Certificate Request excluded reduce the number of watched events
      - apiGroups:
        - certificates.k8s.io
        kinds:
        - CertificateSigningRequest
      - apiGroups:
        - cert-manager.io
        kinds:
        - CertificateRequest
      ### Cilium internal resources excluded reduce the number of watched events and UI Clutter
      - apiGroups:
        - cilium.io
        kinds:
        - CiliumIdentity
        - CiliumEndpoint
        - CiliumEndpointSlice
      ### Kyverno intermediate and reporting resources excluded reduce the number of watched events and improve performance
      - apiGroups:
        - kyverno.io
        - reports.kyverno.io
        - wgpolicyk8s.io
        kinds:
        - PolicyReport
        - ClusterPolicyReport
        - EphemeralReport
        - ClusterEphemeralReport
        - AdmissionReport
        - ClusterAdmissionReport
        - BackgroundScanReport
        - ClusterBackgroundScanReport
        - UpdateRequest
  cmp:
    create: true
    plugins:
      # This plugin is mostly based on https://github.com/argoproj/argo-cd/issues/10745#issuecomment-1949298357
      kustomize-helm:
        parameters:
          static:
            - name: NAMESPACE
              title: Namespace of the application
              required: true
              itemType: string
              collectionType: string
        generate:
          command: ["bash", "-c"]
          args:
            - |
              set -euo pipefail

              repo_root="$(git rev-parse --show-toplevel)"
              app_dir="$(pwd)"
              temp_dir="$(mktemp -d)"
              namespace="${PARAM_NAMESPACE}"
              trap 'rm -rf "${temp_dir}"' EXIT

              cp -R "${repo_root}/." "${temp_dir}/"
              app_path="${temp_dir}/${app_dir#${repo_root}/}"
              cd "${app_path}"

              common_file="${temp_dir}/kubernetes/common/cluster-secrets.sops.yaml"
              if [ -f "${common_file}" ]; then
                while IFS= read -r -d '' key && IFS= read -r -d '' value; do
                  export "${key}=${value}"
                done < <(
                  sops -d --output-type json "${common_file}" |
                    perl -MJSON::PP -0e '
                      my $json = do { local $/; <> };
                      my $doc = JSON::PP->new->decode($json);
                      my $data = $doc->{stringData} // {};
                      for my $key (keys %{$data}) {
                        print $key, "\0", $data->{$key}, "\0";
                      }
                    '
                )
              fi

              find "${temp_dir}/kubernetes" -path '*/charts/*' -prune -o -type f \( -name '*.sops.yaml' -o -name '*.sops.yml' \) -print0 |
                while IFS= read -r -d '' file; do
                  tmp="${file}.dec"
                  sops -d "${file}" |
                    perl -0pe 's/\n?^sops:\n(?:^[[:space:]].*\n?)*\z/\n/ms' > "${tmp}"
                  mv "${tmp}" "${file}"
                done

              unset PARAM_NAMESPACE

              find "${temp_dir}/kubernetes" -path '*/charts/*' -prune -o -type f \( -name '*.yaml' -o -name '*.yml' \) -print0 |
                while IFS= read -r -d '' file; do
                  tmp="${file}.subst"
                  perl -0pe 's/\$\{([A-Za-z_][A-Za-z0-9_]*)\}/exists $ENV{$1} ? $ENV{$1} : $&/ge' "${file}" > "${tmp}"
                  mv "${tmp}" "${file}"
                done

              kustomize edit set namespace -- "${namespace}"
              kustomize build --enable-helm --helm-command '/home/argocd/cmp-server/config/command.sh'

repoServer:
  initContainers:
    - name: install-sops-tools
      image: alpine:3.22
      imagePullPolicy: IfNotPresent
      command: ["sh", "-ec"]
      args:
        - |
          apk add --no-cache curl tar
          curl -fsSL -o /gitops-tools/sops "https://github.com/getsops/sops/releases/download/v3.10.2/sops-v3.10.2.linux.amd64"
          curl -fsSL -o /tmp/age.tar.gz "https://github.com/FiloSottile/age/releases/download/v1.2.1/age-v1.2.1-linux-amd64.tar.gz"
          tar -xzf /tmp/age.tar.gz -C /tmp
          install -m 0755 /tmp/age/age /gitops-tools/age
          chmod 0755 /gitops-tools/sops
      volumeMounts:
        - name: gitops-tools
          mountPath: /gitops-tools
  extraContainers:
    - name: cmp-kustomize-helm
      command: ["/var/run/argocd/argocd-cmp-server"]
      image: |-
        {{ default .Values.global.image.repository .Values.repoServer.image.repository }}:{{ default (include "argo-cd.defaultTag" .) .Values.repoServer.image.tag }}
      env:
        - name: PATH
          value: /gitops-tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        - name: SOPS_AGE_KEY_FILE
          value: /helm-secrets-age/keys.txt
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsNonRoot: true
        runAsUser: 999
      volumeMounts:
        - name: var-files
          mountPath: /var/run/argocd
        - name: plugins
          mountPath: /home/argocd/cmp-server/plugins
        - name: argocd-cmp-cm
          mountPath: /home/argocd/cmp-server/config/plugin.yaml
          subPath: kustomize-helm.yaml
        - name: argocd-kustomize-helm-workaround
          mountPath: /home/argocd/cmp-server/config/command.sh
          subPath: command.sh
        - name: cmp-tmp
          mountPath: /tmp
        - name: gitops-tools
          mountPath: /gitops-tools
        - name: sops-age-key
          mountPath: /helm-secrets-age
          readOnly: true
  volumes:
    - name: argocd-kustomize-helm-workaround
      configMap:
        name: argocd-kustomize-helm-workaround
        defaultMode: 0777
    - name: argocd-cmp-cm
      configMap:
        name: argocd-cmp-cm
    - name: gitops-tools
      emptyDir: {}
    - name: cmp-tmp
      emptyDir: {}
    - name: sops-age-key
      secret:
        secretName: argocd-sops-age-key

global:
  domain: argocd.${SECRET_DOMAIN_0}
